<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Disabled Elements Test</title>
</head>

<body>
  <main>
    <h1>Disabled Elements</h1>
    <label for="enabled-input">Enabled input</label>
    <input type="text" id="enabled-input" name="enabled-input" value="hello" />
    <label for="disabled-input">Disabled input</label>
    <input type="text" id="disabled-input" name="disabled-input" disabled value="can't touch this" />
    <button id="enabled-btn">Click me</button>
    <button id="disabled-btn" disabled>Don't click me</button>
  </main>
</body>

</html>
